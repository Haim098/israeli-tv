<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="referrer" content="no-referrer" />
    <meta name="description" content="צפייה בשידורי טלוויזיה ישראלית בשידור חי" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>טלוויזיה חיה</title>
  </head>
  <body class="bg-neutral-950 text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Splash self-heal: if the app shell hasn't mounted within 8s (a hung
      // service-worker update or chunk after a PWA relaunch leaves the launch
      // logo frozen), reload once to recover. The sessionStorage guard prevents
      // a reload loop if something is genuinely broken.
      (function () {
        var KEY = 'splashReload';
        // If Android discarded this PWA while it was backgrounded (e.g. left in
        // auto-PiP), restoring the hung document can freeze on the launch logo.
        // Start fresh instead. wasDiscarded is cleared by the reload, so this
        // runs at most once.
        if (document.wasDiscarded && !sessionStorage.getItem('discardReload')) {
          sessionStorage.setItem('discardReload', '1');
          location.reload();
          return;
        }
        sessionStorage.removeItem('discardReload');
        setTimeout(function () {
          var root = document.getElementById('root');
          if (!root) return;
          if (root.childElementCount === 0 && !sessionStorage.getItem(KEY)) {
            sessionStorage.setItem(KEY, '1');
            location.reload();
          } else if (root.childElementCount > 0) {
            sessionStorage.removeItem(KEY);
          }
        }, 8000);
      })();
    </script>
  </body>
</html>
